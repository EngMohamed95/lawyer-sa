<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LawyerOS - نظام إدارة المكاتب القانونية</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <script>
      // Global error listener to catch startup crashes
      window.onerror = function(message, source, lineno, colno, error) {
        alert("حدث خطأ في النظام: " + message + "\nالمصدر: " + source);
        return false;
      };
      window.onunhandledrejection = function(event) {
        alert("خطأ في التحميل: " + event.reason);
      };
    </script>
    <style>
      body {
        margin: 0;
        background-color: #F3F4F6; /* Set back to normal app background */
        font-family: sans-serif;
      }
      /* Loader specific styles */
      #initial-loader {
        position: fixed;
        inset: 0;
        background-color: #0A192F;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .loader-container {
        text-align: center;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(212, 175, 55, 0.1);
        border-top-color: #D4AF37;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .text {
        color: #D4AF37;
        font-weight: bold;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="loader-container">
          <div class="spinner"></div>
          <div class="text">جاري تشغيل محرك LawyerOS...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
